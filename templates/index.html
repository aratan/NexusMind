<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ARA | ARCHITECTURE V2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-grid">
    <aside class="sidebar">
        <header style="padding: 10px 0 30px 0;">
            <h1 style="font-size: 1.4rem; font-family: var(--font-tech); color: var(--text-bright); margin:0;">
                <span style="color: var(--cyan-hyper);">_</span>ARA.SYSTEM
            </h1>
            <small style="color: var(--text-ghost);">2026_TACTICAL_OVERRIDE</small>
        </header>

        <div class="glass-panel stat-box">
            <span class="label-elite">Net_Volume_SOL</span>
            <div id="stat-volumen" class="value-elite">0.0000</div>
        </div>

        <div class="glass-panel stat-box">
            <span class="label-elite">Inference_Flow</span>
            <div style="height: 120px; margin-top:20px;">
                <canvas id="solChart"></canvas>
            </div>
        </div>

        <div class="glass-panel stat-box">
            <span class="label-elite">Node_Clusters</span>
            <div style="height: 150px; margin: 20px 0;">
                <canvas id="statusChart"></canvas>
            </div>
            <div style="font-family: var(--font-tech); font-size: 0.75rem;">
                <div style="display:flex; justify-content: space-between;">
                    <span style="color:var(--gold-24k)">IDLE</span> <span id="stat-pendientes">0</span>
                </div>
                <div style="display:flex; justify-content: space-between; margin-top:5px;">
                    <span style="color:var(--cyan-hyper)">ACTIVE</span> <span id="stat-procesando">0</span>
                </div>
                <div style="display:flex; justify-content: space-between; margin-top:5px;">
                    <span style="color:var(--green-signal)">SYNCED</span> <span id="stat-exitos">0</span>
                </div>
            </div>
        </div>

        <div class="glass-panel stat-box">
            <span class="label-elite">Worker_Performance</span>
            <div style="height: 150px; margin-top:20px;">
                <canvas id="workerChart"></canvas>
            </div>
        </div>
    </aside>

    <main id="main-content">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="font-family: var(--font-tech); font-size: 1.2rem; color: var(--text-ghost);">//_RECENT_TRANSACTIONS</h2>
            <code style="color: var(--cyan-hyper); font-size: 0.8rem; background: rgba(0, 242, 255, 0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--cyan-hyper);">
                ROOT_WALLET: {{ wallet[:10] }}...{{ wallet[-10:] }}
            </code>
        </div>

        <div id="task-container" class="task-list">
            <!-- Tareas inyectadas vía JS -->
        </div>
        
        <div id="loading-sentinel" style="text-align: center; padding: 40px; color: var(--text-ghost); font-family: var(--font-tech); font-size: 0.8rem;">
            <div class="loading-spinner"></div>
            <span>//_SCANNING_BLOCKCHAIN...</span>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
